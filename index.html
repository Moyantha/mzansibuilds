<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MzansiBuilds</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="nav-logo">Mzansi<span>Builds</span></div>
    <div class="nav-actions">
      <button class="btn btn-green">+ New Project</button>
      <button class="btn btn-outline">Sign out</button>
    </div>
  </nav>

  <!-- Login / Register Screen -->
  <div class="auth-wrap" id="authScreen">
    <div class="auth-card">
      <h2>Sign in</h2>
      <p class="auth-sub">Welcome back, developer</p>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>

      <p class="error-msg" id="loginError"></p>

      <button class="btn btn-green btn-full" onclick="login()">Sign in</button>

      <p class="auth-switch">
        Don't have an account? 
        <button onclick="showRegister()">Create account</button>
      </p>
    </div>
  </div>

  <!-- Main app (hidden until logged in) -->
  <div id="mainApp" style="display:none;">
    <p>You are logged in!</p>
  </div>

</body>
</html>
